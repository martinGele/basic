name: Release Build
on:
  push:
    branches:
      - production
  workflow_dispatch:
env:
  VERSION_MAJOR_MINOR: "1.0"
jobs:
  build-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    - name: Compute version
      id: version
      run: |
        VERSION_CODE=${{ github.run_number }}
        VERSION_NAME="${VERSION_MAJOR_MINOR}.${{ github.run_number }}"
        echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT
        echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
        echo "Building $VERSION_NAME (code $VERSION_CODE)"
    - name: Decode keystore
      run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > $RUNNER_TEMP/release.keystore
    - name: Run tests
      run: ./gradlew test
    - name: Build release AAB
      env:
        KEYSTORE_PATH: ${{ runner.temp }}/release.keystore
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        VERSION_CODE: ${{ steps.version.outputs.version_code }}
        VERSION_NAME: ${{ steps.version.outputs.version_name }}
      run: ./gradlew bundleRelease
    - name: Upload to Google Play
      uses: r0adkll/upload-google-play@v1
      with:
        serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
        packageName: com.refactoring.excercise
        releaseFiles: app/build/outputs/bundle/release/app-release.aab
        track: internal
        status: completed
    - name: Tag release
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git tag -a "v${{ steps.version.outputs.version_name }}" -m "Release v${{ steps.version.outputs.version_name }}"
        git push origin "v${{ steps.version.outputs.version_name }}"
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v3
      with:
        tag_name: v${{ steps.version.outputs.version_name }}
        files: app/build/outputs/bundle/release/app-release.aab
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    - name: Upload release artifact
      uses: actions/upload-artifact@v4
      with:
        name: release-aab-${{ steps.version.outputs.version_name }}
        path: app/build/outputs/bundle/release/app-release.aab